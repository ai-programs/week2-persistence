<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeRacer 🏎️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-gray-950 text-gray-100 flex flex-col items-center justify-center p-6">

    <!-- ============================== -->
    <!-- GAME CONTAINER                 -->
    <!-- ============================== -->
    <div class="w-full max-w-2xl flex flex-col gap-6">

        <!-- Header -->
        <div class="text-center">
            <h1 class="text-4xl font-bold tracking-tight">
                🏎️ TypeRacer
            </h1>
            <p class="text-gray-400 mt-1">How fast can you type?</p>
        </div>

        <!-- ============================== -->
        <!-- SENTENCE DISPLAY               -->
        <!-- ============================== -->
        <div id="sentence-display"
             class="bg-gray-900 rounded-2xl p-6 text-xl leading-relaxed font-mono min-h-[120px] flex items-center justify-center text-gray-500 border border-gray-800">
            Press <span class="text-indigo-400 font-semibold mx-1">Start</span> to begin!
        </div>

        <!-- ============================== -->
        <!-- INPUT + BUTTON                 -->
        <!-- ============================== -->
        <div class="flex gap-3">
            <input
                id="typing-input"
                type="text"
                placeholder="Start typing here..."
                disabled
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
                spellcheck="false"
                class="flex-1 bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-lg font-mono
                       focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500
                       disabled:opacity-40 disabled:cursor-not-allowed
                       transition-all duration-200"
            />
            <button
                id="start-btn"
                class="bg-indigo-600 hover:bg-indigo-500 active:scale-95
                       text-white font-semibold px-6 py-3 rounded-xl
                       transition-all duration-200 whitespace-nowrap">
                Start
            </button>
        </div>

        <!-- ============================== -->
        <!-- LIVE STATS (visible during game) -->
        <!-- ============================== -->
        <div id="live-stats" class="hidden flex justify-center gap-8 text-sm text-gray-400">
            <div>⏱️ <span id="live-timer">0.0</span>s</div>
            <div>📝 <span id="live-progress">0</span>/<span id="live-total">0</span> characters</div>
        </div>

        <!-- ============================== -->
        <!-- RESULTS PANEL                  -->
        <!-- ============================== -->
        <div id="results-panel" class="hidden bg-gray-900 rounded-2xl p-6 border border-gray-800">
            <h2 class="text-lg font-semibold text-center mb-4">🏁 Results</h2>
            <div class="grid grid-cols-3 gap-4 text-center">
                <div>
                    <div id="result-wpm" class="text-3xl font-bold text-indigo-400">0</div>
                    <div class="text-sm text-gray-400 mt-1">WPM</div>
                </div>
                <div>
                    <div id="result-accuracy" class="text-3xl font-bold text-emerald-400">0%</div>
                    <div class="text-sm text-gray-400 mt-1">Accuracy</div>
                </div>
                <div>
                    <div id="result-time" class="text-3xl font-bold text-amber-400">0s</div>
                    <div class="text-sm text-gray-400 mt-1">Time</div>
                </div>
            </div>
        </div>

        <!-- ============================== -->
        <!-- SCORES HISTORY                 -->
        <!-- ============================== -->
        <div id="scores-section" class="hidden">
            <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">Recent Scores</h2>
            <div id="scores-list" class="flex flex-col gap-2"></div>
        </div>

    </div>

    <script src="main.js"></script>
</body>
</html>
